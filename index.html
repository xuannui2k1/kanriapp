<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鮮魚在庫管理</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #EEF2F7;
  --surface:  #FFFFFF;
  --surface2: #F7F9FC;
  --surface3: #EEF2F7;
  --border:   #DDE3EC;
  --border2:  #C8D0DC;
  --text:     #0F1923;
  --text2:    #5A6478;
  --text3:    #9AA3B2;
  --accent:   #1A6BFF;
  --accent-l: #EBF2FF;
  --accent-d: #1456D6;
  --green:    #059669;
  --green-l:  #ECFDF5;
  --red:      #DC2626;
  --red-l:    #FEF2F2;
  --orange:   #D97706;
  --orange-l: #FFFBEB;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  --shadow:    0 2px 8px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
  --r:    16px;
  --r-sm: 10px;
  --r-xs: 6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;-webkit-font-smoothing:antialiased;
  min-height:100vh;
}
body{padding-bottom:90px}

/* ── HEADER ── */
.header{
  background:var(--surface);
  padding:14px 18px 12px;
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 0 var(--border),0 2px 8px rgba(0,0,0,.04);
}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,#1A6BFF,#0A4ED6);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 2px 8px rgba(26,107,255,.3);
}
.header-title{
  font-family:'Outfit',sans-serif;
  font-size:18px;font-weight:700;
  color:var(--text);letter-spacing:-.3px;
}
.header-date{font-size:11px;color:var(--text3);margin-top:1px;font-weight:500}
.icon-btn{
  width:38px;height:38px;border-radius:12px;
  background:var(--surface2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .15s;
  box-shadow:var(--shadow-sm);
}
.icon-btn:active{transform:scale(.92);background:var(--border)}

/* ── TABS ── */
.tabs{
  background:var(--surface);
  border-bottom:1.5px solid var(--border);
  display:flex;position:sticky;top:65px;z-index:99;
  box-shadow:0 2px 6px rgba(0,0,0,.04);
}
.tab{
  flex:1;padding:10px 4px 9px;
  text-align:center;font-size:11px;font-weight:600;
  color:var(--text3);cursor:pointer;
  border-bottom:2.5px solid transparent;
  transition:all .2s;user-select:none;letter-spacing:.2px;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-icon{font-size:19px;display:block;margin-bottom:3px}

/* ── PAGES ── */
.page{display:none;padding:16px}
.page.active{display:block}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{
  width:100%;background:var(--surface);
  border:1.5px solid var(--border);
  color:var(--text);padding:11px 14px 11px 40px;
  border-radius:var(--r);font-size:14px;
  font-family:'Noto Sans JP',sans-serif;outline:none;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:var(--shadow-sm);
  font-weight:500;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,255,.1)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .si{
  position:absolute;left:13px;top:50%;
  transform:translateY(-50%);color:var(--text3);font-size:15px;
}

/* ── SECTION LABEL ── */
.sec-label{
  font-size:11px;font-weight:700;color:var(--text2);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:10px;margin-top:2px;
  display:flex;justify-content:space-between;align-items:center;
}

/* ── 出庫 STOCK CARDS ── */
.stock-list{display:flex;flex-direction:column;gap:10px}
.stock-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow);
}
.stock-card:active{transform:scale(.985);box-shadow:var(--shadow-sm)}
.stock-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(26,107,255,.1)}
.stock-card.warn{border-color:var(--orange);background:var(--orange-l)}
.fish-icon{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
  background:var(--surface2);border:1.5px solid var(--border);
}
.stock-info{flex:1;min-width:0}
.stock-name{
  font-family:'Outfit',sans-serif;
  font-weight:600;font-size:15px;letter-spacing:-.2px;
}
.stock-sub{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}
.stock-qty-block{text-align:right;flex-shrink:0}
.stock-qty-num{
  font-family:'JetBrains Mono',monospace;
  font-size:24px;font-weight:600;
  color:var(--green);line-height:1;
}
.stock-qty-num.warn{color:var(--orange)}
.stock-qty-unit{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600}
.stock-arrow{
  color:var(--text3);font-size:12px;flex-shrink:0;margin-left:4px;
}

/* ── 在庫チェック ── */
.check-panel{
  background:var(--surface);border:1.5px solid var(--orange);
  border-radius:var(--r);overflow:hidden;margin-bottom:14px;
  box-shadow:0 2px 8px rgba(217,119,6,.1);
}
.check-panel-header{
  background:var(--orange-l);padding:10px 14px;
  border-bottom:1px solid rgba(217,119,6,.2);
  font-size:12px;font-weight:700;color:var(--orange);letter-spacing:.3px;
}
.check-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--border);
}
.check-item:last-child{border-bottom:none}
.check-item-name{font-weight:600;font-size:14px}
.check-item-tag{
  font-size:11px;color:var(--text2);margin-top:2px;font-weight:500;
}
.check-item-qty{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;font-weight:600;
}

/* ── CHECK BTN ── */
.check-btn{
  background:var(--surface);border:1.5px solid var(--border);
  color:var(--text2);padding:6px 12px;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-size:11px;
  font-weight:700;cursor:pointer;letter-spacing:.3px;
  transition:all .15s;display:flex;align-items:center;gap:4px;
}
.check-btn.active{background:var(--orange);color:#fff;border-color:transparent}
.check-btn:active{transform:scale(.95)}

/* ── 入庫 PRODUCT LIST ── */
.product-list{display:flex;flex-direction:column;gap:8px;margin-bottom:90px}
.product-row{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  transition:border-color .2s;box-shadow:var(--shadow);
}
.product-row.open{border-color:var(--accent);box-shadow:0 4px 16px rgba(26,107,255,.12)}
.product-row-hd{
  display:flex;align-items:center;padding:13px 16px;
  cursor:pointer;gap:12px;user-select:none;
}
.product-row-hd:active{background:var(--surface2)}
.prod-emoji{
  width:40px;height:40px;border-radius:12px;
  background:var(--surface2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.prod-info{flex:1;min-width:0}
.prod-name{
  font-family:'Outfit',sans-serif;
  font-weight:600;font-size:14px;letter-spacing:-.1px;
}
.prod-meta{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}
.prod-chev{
  width:24px;height:24px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:10px;flex-shrink:0;
  transition:all .2s;
}
.product-row.open .prod-chev{
  background:var(--accent-l);border-color:rgba(26,107,255,.2);
  color:var(--accent);transform:rotate(90deg);
}
.cart-tag{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--accent-l);color:var(--accent);
  font-size:10px;font-weight:700;padding:2px 7px;
  border-radius:var(--r-xs);margin-left:6px;vertical-align:middle;
}

/* ── 入庫フォーム ── */
.prod-form{
  display:none;border-top:1.5px solid var(--border);
  background:var(--surface2);flex-direction:column;
}
.product-row.open .prod-form{display:flex}

/* ロットセクション */
.in-lot-section{padding:12px 16px 0}
.in-lot-title{
  font-size:10px;font-weight:700;color:var(--text2);
  letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;
}
.in-lot-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.in-lot-row{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r-sm);padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow-sm);
}
.in-lot-info{flex:1}
.in-lot-price{
  font-family:'JetBrains Mono',monospace;
  font-size:15px;font-weight:600;color:var(--text);
}
.in-lot-remain{font-size:12px;color:var(--text2);margin-top:2px;font-weight:500}
.in-lot-add-btn{
  background:var(--green-l);border:1.5px solid rgba(5,150,105,.2);
  color:var(--green);padding:7px 12px;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.in-lot-add-btn:active{transform:scale(.95)}

/* ロット追加インライン */
.in-lot-add-form{
  background:var(--green-l);border:1.5px solid rgba(5,150,105,.25);
  border-radius:var(--r-sm);padding:12px;
  display:none;flex-direction:column;gap:8px;
}
.in-lot-add-form.show{display:flex}
.in-lot-add-top{display:flex;align-items:center;justify-content:space-between}
.in-lot-add-price{
  font-family:'JetBrains Mono',monospace;
  font-size:14px;font-weight:600;color:var(--green);
}
.in-lot-add-row{display:flex;gap:8px;align-items:center}
.in-lot-add-row input{
  flex:1;background:var(--surface);border:1.5px solid rgba(5,150,105,.3);
  color:var(--text);padding:10px;border-radius:var(--r-sm);
  font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:600;
  outline:none;text-align:center;-webkit-appearance:none;
}
.in-lot-add-row input:focus{border-color:var(--green)}
.in-lot-confirm-btn{
  background:var(--green);color:#fff;border:none;
  padding:10px 14px;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.in-lot-cancel-btn{
  background:none;border:none;color:var(--text2);
  font-size:18px;cursor:pointer;padding:2px 4px;
}

/* 新規ロット入力 */
.new-lot-section{padding:0 16px 14px}
.new-lot-divider{
  display:flex;align-items:center;gap:8px;
  margin-bottom:12px;color:var(--text3);
  font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;
}
.new-lot-divider::before,.new-lot-divider::after{
  content:'';flex:1;height:1.5px;background:var(--border);
}
.form-date-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.form-date-row label{
  font-size:12px;color:var(--text2);flex-shrink:0;
  font-weight:600;letter-spacing:.2px;
}
.form-date-row input{
  flex:1;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:var(--r-sm);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;
  box-shadow:var(--shadow-sm);
}
.form-date-row input:focus{border-color:var(--accent)}
.form-2col{display:flex;gap:8px;margin-bottom:10px}
.fg{flex:1}
.fg label{
  font-size:11px;color:var(--text2);font-weight:700;
  display:block;margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;
}
.fg input{
  width:100%;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);padding:10px 12px;border-radius:var(--r-sm);
  font-size:17px;font-family:'JetBrains Mono',monospace;font-weight:600;
  outline:none;-webkit-appearance:none;text-align:right;
  box-shadow:var(--shadow-sm);
}
.fg input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,255,.1)}
.amount-preview{
  background:var(--accent-l);border:1.5px solid rgba(26,107,255,.15);
  border-radius:var(--r-sm);padding:11px 14px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.amount-preview span:first-child{
  font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.3px;
}
.amount-preview span:last-child{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;font-weight:600;color:var(--accent);
}
.form-btns{display:flex;gap:8px}
.btn-add{
  flex:1;background:var(--accent);color:#fff;border:none;
  padding:12px;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;transition:all .15s;letter-spacing:.2px;
  box-shadow:0 2px 8px rgba(26,107,255,.3);
}
.btn-add:active{transform:scale(.97);background:var(--accent-d)}
.btn-close{
  background:var(--surface);border:1.5px solid var(--border);
  color:var(--text2);padding:12px 14px;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;
  font-weight:600;
}

/* ── 出庫 MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,10,20,.5);
  z-index:200;display:none;align-items:flex-end;
  backdrop-filter:blur(8px);
}
.overlay.open{display:flex}
.sheet{
  background:var(--surface);border-radius:24px 24px 0 0;
  padding:0 0 40px;width:100%;
  box-shadow:0 -4px 32px rgba(0,0,0,.15);
  animation:slideUp .3s cubic-bezier(.22,1,.36,1);
  max-height:88vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{
  width:40px;height:4px;background:var(--border2);
  border-radius:2px;margin:14px auto 0;
}
.sheet-header{
  padding:16px 18px 14px;
  border-bottom:1.5px solid var(--border);
}
.sheet-title{
  font-family:'Outfit',sans-serif;
  font-weight:700;font-size:19px;letter-spacing:-.3px;
}
.sheet-sub{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}

/* ロットカード */
.lot-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.lot-card{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r);padding:14px 16px;cursor:pointer;
  transition:all .15s;box-shadow:var(--shadow-sm);
}
.lot-card:active{border-color:var(--accent);background:var(--accent-l)}
.lot-card.selected{border-color:var(--accent);background:var(--accent-l);box-shadow:0 0 0 3px rgba(26,107,255,.1)}
.lot-card-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
}
.lot-price{
  font-family:'JetBrains Mono',monospace;
  font-size:20px;font-weight:600;color:var(--text);
}
.lot-price span{font-size:12px;color:var(--text2);font-weight:500;font-family:'Noto Sans JP',sans-serif}
.lot-badge{
  background:var(--green-l);color:var(--green);
  font-size:13px;font-weight:700;padding:4px 10px;
  border-radius:var(--r-xs);
  font-family:'JetBrains Mono',monospace;
}
.lot-card-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lot-stat-label{
  font-size:10px;color:var(--text2);font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;
}
.lot-stat-val{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:600;
}
.lot-empty{padding:32px 20px;text-align:center;color:var(--text2);font-size:14px}

/* 出庫フォーム */
.out-form{padding:0 16px 16px;border-top:1.5px solid var(--border);padding-top:14px}
.out-form-title{
  font-size:11px;color:var(--text2);font-weight:700;
  margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase;
}
.out-qty-wrap{display:flex;gap:8px;margin-bottom:10px}
.out-qty-wrap input{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);padding:14px;border-radius:var(--r-sm);
  font-size:28px;font-family:'JetBrains Mono',monospace;font-weight:600;
  outline:none;-webkit-appearance:none;text-align:center;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.06);
}
.out-qty-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,255,.1)}
.out-date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.out-date-row label{
  font-size:12px;color:var(--text2);font-weight:700;flex-shrink:0;letter-spacing:.2px;
}
.out-date-row input{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:var(--r-sm);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;
}
.out-date-row input:focus{border-color:var(--accent)}
.warn-box{
  background:var(--orange-l);border:1.5px solid var(--orange);
  border-radius:var(--r-sm);padding:10px 14px;
  font-size:12px;color:var(--orange);font-weight:700;
  margin-bottom:12px;display:none;align-items:center;gap:8px;
}
.warn-box.show{display:flex}
.btn-full{
  width:100%;padding:14px;border-radius:var(--r-sm);border:none;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;transition:all .15s;letter-spacing:.2px;
}
.btn-full:active{transform:scale(.98)}
.btn-out{
  background:var(--red);color:#fff;margin-bottom:8px;
  box-shadow:0 2px 8px rgba(220,38,38,.25);
}
.btn-cancel{
  background:var(--surface2);color:var(--text2);
  border:1.5px solid var(--border);
}

/* 確認モーダル */
.confirm-card{
  margin:12px 16px 0;
  background:var(--surface2);border-radius:var(--r);
  overflow:hidden;border:1.5px solid var(--border);
}
.confirm-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 16px;border-bottom:1px solid var(--border);
}
.confirm-row:last-child{border-bottom:none}
.confirm-label{font-size:13px;color:var(--text2);font-weight:600}
.confirm-val{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;font-weight:600;
}
.confirm-btns{padding:14px 16px 0;display:flex;flex-direction:column;gap:8px}

/* ── 履歴 ── */
.date-row{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.date-row input{
  flex:1;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);padding:10px 14px;border-radius:var(--r);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;
  box-shadow:var(--shadow-sm);font-weight:500;
}
.date-row input:focus{border-color:var(--accent)}
.today-btn{
  background:var(--surface);border:1.5px solid var(--border);
  color:var(--text2);padding:10px 14px;border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;white-space:nowrap;
  box-shadow:var(--shadow-sm);
}
.hist-list{display:flex;flex-direction:column;gap:8px}
.hist-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);padding:13px 16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);
}
.hist-badge{
  padding:4px 10px;border-radius:var(--r-xs);
  font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:.3px;
}
.hist-badge.in{background:var(--green-l);color:var(--green)}
.hist-badge.out{background:var(--red-l);color:var(--red)}
.hist-info{flex:1;min-width:0}
.hist-name{
  font-family:'Outfit',sans-serif;
  font-weight:600;font-size:14px;letter-spacing:-.1px;
}
.hist-meta{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}
.hist-amt{
  font-family:'JetBrains Mono',monospace;
  font-size:15px;font-weight:600;text-align:right;flex-shrink:0;
}
.hist-empty{
  text-align:center;padding:60px 20px;color:var(--text2);
}
.hist-empty .e-icon{font-size:44px;margin-bottom:10px;display:block}
.hist-empty p{font-size:14px;font-weight:500}

/* ── 設定 ── */
.settings-page{display:none}
.settings-page.active{display:block;padding:16px}
.settings-back{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.back-btn{
  background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);padding:9px 14px;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;box-shadow:var(--shadow-sm);
}
.settings-title{
  font-family:'Outfit',sans-serif;
  font-weight:700;font-size:19px;letter-spacing:-.2px;
}
.set-section{margin-bottom:24px}
.set-label{
  font-size:11px;font-weight:700;color:var(--text2);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:10px;
}
.opening-row{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);padding:12px 16px;
  margin-bottom:7px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow-sm);
}
.opening-name{
  flex:1;font-size:14px;font-weight:600;
  font-family:'Outfit',sans-serif;letter-spacing:-.1px;
}
.opening-input{
  width:76px;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);padding:8px;border-radius:var(--r-sm);
  font-size:15px;font-family:'JetBrains Mono',monospace;
  font-weight:600;text-align:center;outline:none;
}
.opening-input:focus{border-color:var(--accent)}
.opening-unit{font-size:12px;color:var(--text3);width:24px;font-weight:600}
.set-input{
  width:100%;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:var(--r);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;
  outline:none;margin-bottom:8px;box-shadow:var(--shadow-sm);
  font-weight:500;
}
.set-input:focus{border-color:var(--accent)}
.set-fix-btn{
  width:100%;padding:13px;border-radius:var(--r-sm);border:none;
  background:var(--orange);color:#fff;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;margin-top:6px;letter-spacing:.2px;
  box-shadow:0 2px 8px rgba(217,119,6,.2);
}
.set-fix-result{
  display:none;margin-top:8px;
  background:var(--green-l);border:1.5px solid rgba(5,150,105,.2);
  border-radius:var(--r-sm);padding:10px 14px;
  font-size:13px;color:var(--green);font-weight:700;
}

/* ── 新商品 ── */
.np-form-group{margin-bottom:14px;padding:0 16px}
.np-label{
  font-size:11px;color:var(--text2);font-weight:700;
  display:block;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;
}
.np-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:var(--r-sm);
  font-size:15px;font-family:'Noto Sans JP',sans-serif;
  outline:none;font-weight:500;
}
.np-input:focus{border-color:var(--accent)}

/* ── SETUP ── */
.setup-wrap{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:24px;
}
.setup-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:24px;padding:28px 24px;
  box-shadow:var(--shadow-lg);width:100%;max-width:400px;
}
.setup-logo{
  width:60px;height:60px;border-radius:18px;
  background:linear-gradient(135deg,#1A6BFF,#0A4ED6);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:16px;
  box-shadow:0 4px 16px rgba(26,107,255,.3);
}
.setup-title{
  font-family:'Outfit',sans-serif;
  font-size:24px;font-weight:700;color:var(--text);
  margin-bottom:4px;letter-spacing:-.4px;
}
.setup-desc{
  font-size:13px;color:var(--text2);margin-bottom:22px;
  line-height:1.6;font-weight:500;
}
.setup-label{
  font-size:11px;font-weight:700;color:var(--text2);
  display:block;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;
}
.setup-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:var(--r-sm);
  font-size:13px;font-family:monospace;outline:none;margin-bottom:12px;
  font-weight:500;
}
.setup-input:focus{border-color:var(--accent)}
.setup-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-d));
  color:#fff;border:none;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;box-shadow:0 4px 16px rgba(26,107,255,.3);
  letter-spacing:.2px;
}

/* ── BUTTONS ── */
.btn-sm{
  padding:7px 12px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);
  font-family:'Noto Sans JP',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;
  box-shadow:var(--shadow-sm);
}
.btn-sm.accent{background:var(--accent);color:#fff;border-color:transparent}
.btn-sm.danger{background:var(--red);color:#fff;border-color:transparent}
.btn-sm.green{background:var(--green);color:#fff;border-color:transparent}
.mt8{margin-top:8px}
.add-prod-btn{
  background:var(--accent-l);border:1.5px solid rgba(26,107,255,.2);
  color:var(--accent);padding:7px 12px;border-radius:var(--r-sm);
  font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.2px;
}

/* ── 集計タブ ── */
.summary-month-selector{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;
  margin-bottom:14px;scrollbar-width:none;
}
.summary-month-selector::-webkit-scrollbar{display:none}
.month-chip{
  flex-shrink:0;padding:8px 14px;border-radius:100px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .15s;color:var(--text2);
  box-shadow:var(--shadow-sm);white-space:nowrap;
}
.month-chip.active{
  background:var(--accent);color:#fff;
  border-color:transparent;
  box-shadow:0 2px 8px rgba(26,107,255,.3);
}
.month-chip:active{transform:scale(.95)}

.summary-total-card{
  background:linear-gradient(135deg,var(--accent),var(--accent-d));
  border-radius:var(--r);padding:16px 18px;
  margin-bottom:14px;color:#fff;
  box-shadow:0 4px 16px rgba(26,107,255,.3);
}
.summary-total-label{font-size:12px;opacity:.8;font-weight:600;letter-spacing:.3px}
.summary-total-value{
  font-family:'JetBrains Mono',monospace;
  font-size:28px;font-weight:700;margin-top:4px;letter-spacing:-.5px;
}
.summary-total-sub{font-size:12px;opacity:.7;margin-top:4px;font-weight:500}

.summary-list{display:flex;flex-direction:column;gap:8px}
.summary-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;
}
.summary-card.positive{border-left:4px solid var(--green)}
.summary-card.negative{border-left:4px solid var(--red)}
.summary-card.zero{border-left:4px solid var(--border2)}
.summary-fish{
  width:40px;height:40px;border-radius:12px;
  background:var(--surface2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.summary-info{flex:1;min-width:0}
.summary-name{
  font-family:'Outfit',sans-serif;
  font-weight:600;font-size:14px;letter-spacing:-.1px;
}
.summary-code{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600}
.summary-amount{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:600;text-align:right;flex-shrink:0;
}
.summary-empty{
  text-align:center;padding:60px 20px;color:var(--text2);
}

/* ── TOAST ── */
.toast{
  position:fixed;top:76px;left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:var(--text);color:#fff;
  padding:10px 20px;border-radius:100px;
  font-size:13px;font-weight:700;
  opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;z-index:400;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  letter-spacing:.2px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
.toast.warn{background:var(--orange)}

/* ── LOADING ── */
.loading{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;gap:14px;color:var(--text3);
}
.spin{
  width:32px;height:32px;
  border:2.5px solid var(--border2);
  border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NO STOCK ── */
.no-stock-msg{
  text-align:center;padding:60px 20px;color:var(--text2);
}
.no-stock-msg .e-icon{font-size:44px;margin-bottom:10px;display:block}
.no-stock-msg p{font-size:14px;font-weight:500}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupPage" class="setup-wrap">
  <div class="setup-card">
    <div class="setup-logo">🐟</div>
    <div class="setup-title">鮮魚在庫管理</div>
    <div class="setup-desc">Google Apps ScriptのデプロイURLを入力して接続してください</div>
    <label class="setup-label">Apps Script URL</label>
    <input class="setup-input" id="setupUrl" type="url" placeholder="https://script.google.com/macros/s/..." />
    <button class="setup-btn" onclick="connect()">接続する →</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainWrap" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🐟</div>
      <div>
        <div class="header-title">鮮魚在庫管理</div>
        <div class="header-date" id="hDate"></div>
      </div>
    </div>
    <div class="icon-btn" onclick="showSettings()">⚙️</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="goTab('out')"><span class="tab-icon">📦</span>出庫</div>
    <div class="tab" onclick="goTab('in')"><span class="tab-icon">🚢</span>入庫</div>
    <div class="tab" onclick="goTab('hist')"><span class="tab-icon">📋</span>履歴</div>
    <div class="tab" onclick="goTab('sum')"><span class="tab-icon">📊</span>集計</div>
  </div>

  <!-- TAB: 出庫 -->
  <div class="page active" id="page-out">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" placeholder="商品名で検索..." oninput="filterOut()" id="outSearch" />
    </div>
    <div class="sec-label">
      <span id="outLabelText">商品一覧</span>
      <button class="check-btn" id="checkBtn" onclick="toggleCheck()">⚠️ 在庫チェック</button>
    </div>
    <div id="checkPanel" style="display:none;margin-bottom:14px"></div>
    <div class="stock-list" id="stockList"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
  </div>

  <!-- TAB: 入庫 -->
  <div class="page" id="page-in">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" placeholder="商品名で検索..." oninput="filterIn()" id="inSearch" />
    </div>
    <div class="sec-label">
      <span id="inLabel">商品一覧</span>
      <button class="add-prod-btn" onclick="openNP()">＋ 新商品</button>
    </div>
    <div class="product-list" id="productList"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
  </div>

  <!-- TAB: 集計 -->
  <div class="page" id="page-sum">
    <div class="summary-month-selector" id="monthSelector">
      <div class="loading"><div class="spin"></div></div>
    </div>
    <div id="summaryContent">
      <div class="loading"><div class="spin"></div>読み込み中...</div>
    </div>
  </div>

  <!-- TAB: 履歴 -->
  <div class="page" id="page-hist">
    <div class="date-row">
      <input type="date" id="histDate" onchange="loadHist()" />
      <button class="today-btn" onclick="todayHist()">今日</button>
    </div>
    <div class="hist-list" id="histList"><div class="loading"><div class="spin"></div>読み込み中...</div></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-page" id="settingsPage">
  <div class="settings-back">
    <button class="back-btn" onclick="hideSettings()">← 戻る</button>
    <span class="settings-title">設定</span>
  </div>
  <div class="set-section">
    <div class="set-label">期首在庫</div>
    <div id="openingList"><div class="loading"><div class="spin"></div></div></div>
    <button class="btn-full btn-out mt8" style="background:var(--green);box-shadow:0 2px 8px rgba(5,150,105,.25);width:100%;padding:13px;border-radius:var(--r-sm);border:none;font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;color:#fff" onclick="saveOpening()">💾 期首在庫を保存</button>
    <button class="set-fix-btn" onclick="fixNegativeStock()">🔧 マイナス在庫を0に修正</button>
    <div class="set-fix-result" id="fixResult"></div>
  </div>
  <div class="set-section">
    <div class="set-label">API設定</div>
    <input class="set-input" type="url" id="setUrl" placeholder="https://script.google.com/macros/s/..." />
    <button class="btn-sm accent" onclick="updateUrl()">URLを更新</button>
  </div>
</div>

<!-- 出庫 LOT MODAL -->
<div class="overlay" id="outOverlay" onclick="if(event.target===this)closeOut()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="outSheetName">—</div>
      <div class="sheet-sub">出庫するロットを選択してください</div>
    </div>
    <div class="lot-list" id="lotList"></div>
    <div class="out-form" id="outForm" style="display:none">
      <div class="out-form-title">出庫数量を入力 — <span id="selLotPrice">—</span></div>
      <div class="out-qty-wrap">
        <input type="number" id="outQty" placeholder="0" min="0.1" step="0.1" oninput="chkWarn()" />
      </div>
      <div class="out-date-row">
        <label>出庫日</label>
        <input type="date" id="outDate" />
      </div>
      <div class="warn-box" id="warnBox">⚠️ 在庫不足！マイナスになります</div>
      <button class="btn-full btn-out" onclick="submitOut()">確認画面へ →</button>
      <button class="btn-full btn-cancel mt8" onclick="closeOut()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 出庫確認 MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="cfTitle">出庫確認</div>
      <div class="sheet-sub">内容を確認して出庫してください</div>
    </div>
    <div class="confirm-card">
      <div class="confirm-row">
        <span class="confirm-label">出庫数量</span>
        <span class="confirm-val" id="cfQty" style="color:var(--red)">—</span>
      </div>
      <div class="confirm-row">
        <span class="confirm-label">出庫後の残高</span>
        <span class="confirm-val" id="cfRemain">—</span>
      </div>
    </div>
    <div id="cfWarn" style="display:none;margin:10px 16px 0;background:var(--orange-l);border:1.5px solid var(--orange);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--orange);font-weight:700;text-align:center">
      ⚠️ 出庫後に残高がマイナスになります！
    </div>
    <div class="confirm-btns">
      <button class="btn-full btn-out" id="cfBtn" onclick="confirmOut()">📤 出庫確定</button>
      <button class="btn-full btn-cancel" onclick="document.getElementById('confirmOverlay').classList.remove('open')">キャンセル</button>
    </div>
  </div>
</div>

<!-- 新商品 MODAL -->
<div class="overlay" id="npOverlay" onclick="if(event.target===this)closeNP()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">新商品を追加</div>
      <div class="sheet-sub">商品マスターに登録します</div>
    </div>
    <div style="padding:16px 0 0">
      <div class="np-form-group">
        <label class="np-label">商品名</label>
        <input class="np-input" type="text" id="npName" placeholder="例: ヒラメ" />
      </div>
      <div class="np-form-group">
        <label class="np-label">規格（単位）</label>
        <input class="np-input" type="text" id="npUnit" placeholder="例: 箱, kg, 本..." />
      </div>
      <div style="padding:0 16px">
        <button class="btn-full btn-out mt8" style="background:var(--accent);box-shadow:0 2px 8px rgba(26,107,255,.25)" onclick="submitNP()">✅ 追加する</button>
        <button class="btn-full btn-cancel mt8" onclick="closeNP()">キャンセル</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ============================================================
// STATE
// ============================================================
let API = localStorage.getItem('apiUrl') || '';
let products = [], stock = [], lots = {}, cart = [], cartOpen = false;
let openProd = null, selProduct = null, selLot = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  setDates();
  if (API) startApp();
});

function setDates() {
  const t = new Date(), ds = fd(t);
  document.getElementById('outDate').value = ds;
  document.getElementById('histDate').value = ds;
  const D = ['日','月','火','水','木','金','土'];
  document.getElementById('hDate').textContent =
    `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日（${D[t.getDay()]}）`;
}

function connect() {
  const u = document.getElementById('setupUrl').value.trim();
  if (!u) return toast('URLを入力してください','err');
  API = u; localStorage.setItem('apiUrl', u); startApp();
}
function updateUrl() {
  const u = document.getElementById('setUrl').value.trim();
  if (!u) return toast('URLを入力してください','err');
  API = u; localStorage.setItem('apiUrl', u); toast('更新しました','ok');
}

async function startApp() {
  document.getElementById('setupPage').style.display = 'none';
  document.getElementById('mainWrap').style.display = 'block';
  document.getElementById('setUrl').value = API;
  await Promise.all([loadProducts(), loadStock()]);
  loadHist();
}

// ============================================================
// API
// ============================================================
async function GET(action, params = {}) {
  const u = new URL(API);
  u.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => u.searchParams.set(k,v));
  return (await fetch(u.toString())).json();
}
async function POST(data) {
  return (await fetch(API, { method:'POST', body:JSON.stringify(data) })).json();
}

// ============================================================
// LOAD
// ============================================================
async function loadProducts() {
  try { const d = await GET('getProducts'); products = d.products || []; }
  catch(e) { toast('商品データ取得失敗','err'); }
}

async function loadStock() {
  try {
    const d = await GET('getStock');
    stock = (d.stock || []).filter(s => s.name);
    renderStock(stock); // 出庫タブのみ即時レンダリング
    // 入庫タブはアクティブな時だけレンダリング（重くなるのを防ぐ）
    if (document.getElementById('page-in').classList.contains('active')) {
      renderProducts(stock);
    }
  } catch(e) {
    document.getElementById('stockList').innerHTML = '<div class="loading">データ取得失敗</div>';
  }
}

// ============================================================
// 出庫タブ — tồn <= 0 thì ẩn
// ============================================================
function renderStock(data) {
  const el = document.getElementById('stockList');
  // ★ Chỉ ẩn khi tổng tồn <= 0 (tất cả lô đều hết)
  // Lô âm riêng lẻ không ảnh hưởng nếu lô khác vẫn còn
  // 少なくとも1つのロットに在庫があれば表示
  // currentQtyが0以下でも、特定ロットが正の場合は表示する
  const visible = data.filter(s => {
    // ロット在庫がある可能性がある場合は表示
    // (期首在庫 + 入庫合計) > 出庫合計 なら何らかのロットが残っている
    const totalIn = (s.openingQty || 0) + (s.inQty || 0);
    const totalOut = s.outQty || 0;
    return totalIn > totalOut;
  });
  document.getElementById('outLabelText').textContent = `在庫あり商品（${visible.length}件）`;
  if (!visible.length) {
    el.innerHTML = `<div class="no-stock-msg"><div class="e-icon">📭</div>在庫のある商品がありません</div>`;
    return;
  }
  el.innerHTML = visible.map(s => {
    const isLow = s.currentQty <= 2;
    const p = s.lastUnitPrice ? `直近単価 ¥${s.lastUnitPrice.toLocaleString()}` : '単価未設定';
    return `<div class="stock-card ${isLow?'warn':''}" onclick="openOut(${s.code})">
      <div class="fish-icon">${emo(s.name)}</div>
      <div class="stock-info">
        <div class="stock-name">${s.name}</div>
        <div class="stock-sub">${p} · #${s.code}</div>
      </div>
      <div class="stock-qty-block">
        <div class="stock-qty-num ${isLow?'warn':''}">${fn(s.currentQty)}</div>
        <div class="stock-qty-unit">${s.unit}</div>
      </div>
    </div>`;
  }).join('');
}

function filterOut() {
  const q = document.getElementById('outSearch').value.toLowerCase();
  renderStock(stock.filter(s => s.name.toLowerCase().includes(q) || String(s.code).includes(q)));
}

async function openOut(code) {
  selProduct = stock.find(s => s.code == code);
  if (!selProduct) return;
  document.getElementById('outSheetName').textContent = selProduct.name;
  document.getElementById('outForm').style.display = 'none';
  document.getElementById('lotList').innerHTML = '<div class="loading"><div class="spin"></div>読み込み中...</div>';
  document.getElementById('outOverlay').classList.add('open');
  document.getElementById('outDate').value = fd(new Date());
  document.getElementById('outQty').value = '';
  document.getElementById('warnBox').classList.remove('show');
  selLot = null;
  try {
    const d = await GET('getLots', { code });
    const lotArr = d.lots || [];
    if (!lotArr.length) {
      document.getElementById('lotList').innerHTML = '<div class="lot-empty">📭 在庫ロットがありません</div>';
      return;
    }
    document.getElementById('lotList').innerHTML = lotArr.map((l,i) =>
      `<div class="lot-card" id="lc_${i}" onclick="selLotCard(${i},${l.unitPrice},${l.remainQty})">
        <div class="lot-card-top">
          <div class="lot-price">¥${l.unitPrice.toLocaleString()}<span style="font-size:12px;color:var(--text2)"> /単価</span></div>
          <div class="lot-badge">${fn(l.remainQty)} ${selProduct.unit}</div>
        </div>
        <div class="lot-card-row">
          <div class="lot-stat"><div class="lot-stat-label">残数量</div><div class="lot-stat-val">${fn(l.remainQty)} ${selProduct.unit}</div></div>
          <div class="lot-stat"><div class="lot-stat-label">残金額</div><div class="lot-stat-val">¥${l.remainAmount.toLocaleString()}</div></div>
        </div>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById('lotList').innerHTML = '<div class="lot-empty">データ取得失敗</div>';
  }
}

function selLotCard(idx, price, remainQty) {
  selLot = { price, remainQty };
  document.getElementById('selLotPrice').textContent = `¥${price.toLocaleString()} /単価`;
  document.getElementById('outForm').style.display = 'block';
  document.getElementById('outQty').focus();
  document.querySelectorAll('.lot-card').forEach((c,i) => c.classList.toggle('selected', i===idx));
  setTimeout(() => document.getElementById('outForm').scrollIntoView({behavior:'smooth',block:'nearest'}), 100);
}

function chkWarn() {
  const qty = parseFloat(document.getElementById('outQty').value) || 0;
  const over = selLot && qty > selLot.remainQty;
  const warnBox = document.getElementById('warnBox');
  warnBox.classList.toggle('show', over);
  if (over) {
    warnBox.textContent = `⚠️ 在庫不足！残数 ${selLot.remainQty}${selProduct?.unit||''} に対して ${qty}${selProduct?.unit||''} 出庫するとマイナスになります`;
  }
}

let isSubmitting = false;
let pendingOut = null;

function submitOut() {
  const qty = parseFloat(document.getElementById('outQty').value);
  if (!qty || qty <= 0) return toast('数量を入力してください','err');
  if (!selLot || !selProduct) return;

  // 確認モーダルに情報をセット
  const remain = selLot.remainQty - qty;
  pendingOut = { qty, date: document.getElementById('outDate').value };

  document.getElementById('cfTitle').textContent = selProduct.name + ' を出庫';
  document.getElementById('cfQty').textContent = `${qty} ${selProduct.unit}`;
  document.getElementById('cfRemain').textContent = `${fn(remain)} ${selProduct.unit}`;
  document.getElementById('cfRemain').style.color = remain < 0 ? 'var(--red)' : 'var(--green)';
  document.getElementById('cfWarn').style.display = remain < 0 ? 'block' : 'none';

  document.getElementById('confirmOverlay').classList.add('open');
}

async function confirmOut() {
  if (isSubmitting || !pendingOut || !selLot || !selProduct) return;
  isSubmitting = true;
  const btn = document.getElementById('cfBtn');
  if (btn) { btn.textContent = '送信中...'; btn.style.opacity = '0.6'; }

  try {
    await POST({ action:'addEntry', date: pendingOut.date,
      type:'出庫', code:selProduct.code, name:selProduct.name,
      unit:selProduct.unit, qty: pendingOut.qty, unitPrice:selLot.price });
    document.getElementById('confirmOverlay').classList.remove('open');
    closeOut();
    toast(`${selProduct.name} ${pendingOut.qty}${selProduct.unit} 出庫完了 ✓`,'ok');
    pendingOut = null;
    await Promise.all([loadProducts(), loadStock()]);
  } catch(e) {
    toast('送信失敗','err');
  } finally {
    isSubmitting = false;
    if (btn) { btn.textContent = '📤 出庫確定'; btn.style.opacity = '1'; }
  }
}

function closeOut() { document.getElementById('outOverlay').classList.remove('open'); selLot = null; }

async function renderProducts(data) {

  // ロット情報を並行取得
  const lotResults = await Promise.all(
    data.map(s => GET('getLots', { code: s.code }).catch(() => ({ lots:[] })))
  );

  el.innerHTML = data.map(s => {
    const inCart = cart.filter(c => c.code == s.code).length;

          <button class="in-lot-cancel-btn" onclick="hideLotAddForm(${s.code},${li})">✕</button>

function hideLotAddForm(code, idx) {

}

let isInSubmitting = false;
async function addToLot(code, idx, unitPrice, name, unit) {
  if (isInSubmitting) return;
  const qty = parseFloat(document.getElementById(`ilaq_${code}_${idx}`)?.value);
  const date = document.getElementById(`pd_${code}`)?.value || fd(new Date());
  if (!qty || qty <= 0) return toast('数量を入力してください','err');
  isInSubmitting = true;
  const btn = document.querySelector(`#ilaf_${code}_${idx} .in-lot-confirm-btn`);
  if (btn) { btn.textContent = '送信中...'; btn.style.opacity = '0.6'; }
  try {
    await POST({ action:'addEntry', date, type:'入庫', code, name, unit, qty, unitPrice, amount: qty * unitPrice });
    hideLotAddForm(code, idx);
    document.getElementById(`ilaq_${code}_${idx}`).value = '';
    toast(`${name} ¥${unitPrice.toLocaleString()} 入庫完了 ✓`,'ok');
    await Promise.all([loadProducts(), loadStock()]);
  } catch(e) {
    toast('送信失敗','err');
  } finally {
    isInSubmitting = false;
    if (btn) { btn.textContent = '追加 ✓'; btn.style.opacity = '1'; }
  }
}

function calcAmt(code) {
  const q = parseFloat(document.getElementById(`pq_${code}`)?.value) || 0;
  const p = parseFloat(document.getElementById(`pp_${code}`)?.value) || 0;
  document.getElementById(`pa_${code}`).textContent = (q && p) ? `¥${Math.round(q*p).toLocaleString()}` : '¥ —';
}

async function addNewLot(code, name, unit) {
  if (isInSubmitting) return;
  const qty = parseFloat(document.getElementById(`pq_${code}`)?.value);
  const unitPrice = parseFloat(document.getElementById(`pp_${code}`)?.value);
  const date = document.getElementById(`pd_${code}`)?.value || fd(new Date());
  if (!qty || qty <= 0) return toast('数量を入力してください','err');
  if (!unitPrice || unitPrice <= 0) return toast('単価を入力してください','err');
  isInSubmitting = true;
  const btn = document.querySelector(`#pr_${code} .btn-add`);
  if (btn) { btn.textContent = '送信中...'; btn.style.opacity = '0.6'; }
  try {
    await POST({ action:'addEntry', date, type:'入庫', code, name, unit, qty, unitPrice, amount: qty * unitPrice });
    toggleProd(code);
    toast(`${name} 入庫完了 ✓`,'ok');
    await Promise.all([loadProducts(), loadStock()]);
  } catch(e) {
    toast('送信失敗','err');
  } finally {
    isInSubmitting = false;
    if (btn) { btn.textContent = '＋ 入庫登録'; btn.style.opacity = '1'; }
  }
}

function toggleProd(code) {
  if (openProd && openProd !== code) {
    const prev = document.getElementById(`pr_${openProd}`);
    if (prev) prev.classList.remove('open');
  }
  const row = document.getElementById(`pr_${code}`);
  if (!row) return;
  if (openProd === code) { row.classList.remove('open'); openProd = null; }
  else { row.classList.add('open'); openProd = code; setTimeout(() => row.scrollIntoView({behavior:'smooth',block:'nearest'}), 100); }
}

function filterIn() {
  const q = document.getElementById('inSearch').value.toLowerCase();
  renderProducts(stock.filter(s => s.name.toLowerCase().includes(q) || String(s.code).includes(q)));
}

function renderCheckList() {
  const panel = document.getElementById('checkPanel');
  const problems = stock.filter(s => {
    const totalIn = (s.openingQty || 0) + (s.inQty || 0);
    const totalOut = s.outQty || 0;
    return (totalIn - totalOut) <= 0;
  });

  if (!problems.length) {

  }

        ${qty} ${s.unit}
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `<div class="check-panel"><div class="check-panel-header">⚠️ 要確認 — 在庫0以下の商品（${problems.length}件）</div>${items}</div>`;
}

async function fixNegativeStock() {
  // 在庫がマイナスの商品を取得して期首在庫を調整
  try {
    const d = await GET('getStock');
    const negatives = (d.stock || []).filter(s => s.currentQty < 0);
    
    if (!negatives.length) {
      document.getElementById('fixResult').style.display = 'block';
      document.getElementById('fixResult').textContent = '✅ マイナス在庫はありません！';
      return;
    }

    // 現在の期首在庫を取得
    const op = await GET('getOpeningStock');
    const openingMap = {};
    (op.stock || []).forEach(o => { openingMap[o.code] = o; });

    // マイナス分を期首在庫に加算して0にする
    const newStock = products.filter(p => p.name).map(p => {
      const current = negatives.find(n => n.code == p.code);
      const existing = openingMap[p.code] || { qty: 0, unitPrice: 0 };
      let qty = existing.qty || 0;
      if (current) {
        // マイナス分だけ期首在庫を増やして0にする
        qty = qty + Math.abs(current.currentQty);
      }
      return { code: p.code, name: p.name, qty, unitPrice: existing.unitPrice || 0 };
    });

    await POST({ action: 'setOpeningStock', stock: newStock });

    // 結果表示
    const names = negatives.map(n => `${n.name}(${fn(n.currentQty)}→0)`).join('、');
    const resultEl = document.getElementById('fixResult');
    resultEl.style.display = 'block';
    resultEl.textContent = `✅ 修正完了: ${names}`;

    // 再読み込み
    await Promise.all([loadProducts(), loadStock()]);
    loadOpening();
    toast(`${negatives.length}件のマイナス在庫を修正しました`, 'ok');
  } catch(e) {
    toast('修正失敗', 'err');
  }
}

// ============================================================
// 集計タブ
// ============================================================
let summaryData = null;
let selMonth = null;

async function loadSummary() {
  const selector = document.getElementById('monthSelector');
  const content = document.getElementById('summaryContent');
  selector.innerHTML = '<div class="loading"><div class="spin"></div></div>';
  content.innerHTML = '<div class="loading"><div class="spin"></div>読み込み中...</div>';

  try {
    const d = await GET('getSummary');
    if (d.error) throw new Error(d.error);
    summaryData = d;

    // 月チップを作成（データがある月のみ）
    const activeMonths = d.months.filter(m => 
      d.items.some(item => item.months[m] !== 0)
    );

    if (!activeMonths.length) {
      selector.innerHTML = '';
      content.innerHTML = '<div class="summary-empty">データがありません</div>';
      return;
    }

    // デフォルト: 合計表示
    selMonth = '合計';

    // 「合計」チップ + 各月チップ
    selector.innerHTML = 
      `<div class="month-chip ${selMonth === '合計' ? 'active' : ''}" onclick="selectMonth('合計')" style="background:${selMonth==='合計'?'var(--accent)':'var(--surface)'};color:${selMonth==='合計'?'#fff':'var(--text2)'};border-color:${selMonth==='合計'?'transparent':'var(--border)'}">📊 合計</div>` +
      activeMonths.map(m =>
        `<div class="month-chip ${m === selMonth ? 'active' : ''}" onclick="selectMonth('${m}')">${m}</div>`
      ).join('');

    renderSummary();
  } catch(e) {
    content.innerHTML = `<div class="summary-empty">データ取得失敗<br><small>${e.message}</small></div>`;
  }
}

function selectMonth(month) {
  selMonth = month;
  document.querySelectorAll('.month-chip').forEach(c => {
    const chipLabel = c.textContent.replace('📊 ', '').trim();
    const isActive = chipLabel === month || (month === '合計' && c.textContent.includes('合計'));
    c.classList.toggle('active', isActive);
  });
  renderSummary();
}

function renderSummary() {
  if (!summaryData || !selMonth) return;
  const el = document.getElementById('summaryContent');

  // 合計モード or 月モード
  const isTotal = selMonth === '合計';

  const items = summaryData.items.map(item => ({
    ...item,
    amount: isTotal ? item.total : (item.months[selMonth] || 0)
  })).filter(item => item.amount !== 0)
    .sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount));

  const monthTotal = items.reduce((s, i) => s + i.amount, 0);
  const positiveTotal = items.filter(i => i.amount > 0).reduce((s, i) => s + i.amount, 0);
  const negativeTotal = items.filter(i => i.amount < 0).reduce((s, i) => s + i.amount, 0);

  if (!items.length) {
    el.innerHTML = `<div class="summary-empty"><span class="e-icon">📭</span><p>${selMonth}のデータはありません</p></div>`;
    return;
  }

  const sign = monthTotal >= 0 ? '+' : '';
  const headerLabel = isTotal ? '全期間 入出庫金額合計' : `${selMonth} 入出庫金額`;
  const headerSub = isTotal
    ? `入庫累計 +¥${fmtYen(positiveTotal)} ／ 出庫累計 -¥${fmtYen(negativeTotal)}`
    : `入庫 +¥${fmtYen(positiveTotal)} ／ 出庫 -¥${fmtYen(negativeTotal)}`;

  // 合計モードは全商品表示（棚卸し用）
  const allItems = isTotal
    ? summaryData.items.map(item => ({ ...item, amount: item.total }))
        .sort((a,b) => Math.abs(b.amount) - Math.abs(a.amount))
    : items;

  el.innerHTML = `
    <div class="summary-total-card">
      <div class="summary-total-label">${headerLabel}</div>
      <div class="summary-total-value">${sign}¥${fmtYen(monthTotal)}</div>
      <div class="summary-total-sub">${headerSub}</div>
    </div>
    ${isTotal ? `
    <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm)">
      <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">📋 棚卸し確認 — 全商品</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--green-l);border:1px solid rgba(5,150,105,.2);border-radius:var(--r-sm);padding:10px;text-align:center">
          <div style="font-size:11px;color:var(--green);font-weight:700">入庫累計</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--green);margin-top:4px">+¥${fmtYen(positiveTotal)}</div>
        </div>
        <div style="background:var(--red-l);border:1px solid rgba(220,38,38,.2);border-radius:var(--r-sm);padding:10px;text-align:center">
          <div style="font-size:11px;color:var(--red);font-weight:700">出庫累計</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--red);margin-top:4px">-¥${fmtYen(negativeTotal)}</div>
        </div>
      </div>
    </div>` : ''}
    <div class="summary-list">
      ${allItems.map(item => {
        const isPos = item.amount > 0;
        const isZero = item.amount === 0;
        const cls = isZero ? 'zero' : isPos ? 'positive' : 'negative';
        const s = isPos ? '+' : '';
        const color = isZero ? 'var(--text3)' : isPos ? 'var(--green)' : 'var(--red)';
        return `<div class="summary-card ${cls}">
          <div class="summary-fish">${emo(item.name)}</div>
          <div class="summary-info">
            <div class="summary-name">${item.name}</div>
            <div class="summary-code">#${item.code}</div>
          </div>
          <div class="summary-amount" style="color:${color}">
            ${isZero ? '¥0' : s+'¥'+fmtYen(item.amount)}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function goTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',['out','in','hist','sum'][i]===name));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  if (name === 'hist') loadHist();
  if (name === 'in') renderProducts(stock);
  if (name === 'out') renderStock(stock);
  if (name === 'sum') loadSummary();
}
function toast(msg,type='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2800);
}
function fd(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fn(n) {
  if(n===undefined||n===null) return 0;
  return Math.round(n*100)/100;
}

// 金額フォーマット（カンマ区切り、小数点なし）
function fmtYen(n) {
  const abs = Math.abs(Math.round(n));
  return abs.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function emo(name) {
  const m={'むつ':'🐟','クエ':'🐡','マグロ':'🐠','イカ':'🦑','タコ':'🐙','サバ':'🐟','アナゴ':'🐍','カマス':'🐟','カニ':'🦀','ホタテ':'🐚','サワラ':'🐟','ホタル':'🦑','送料':'📦','包材':'📦','ヒラ':'🐟','タイ':'🐠','ブリ':'🐟'};
  for(const[k,v] of Object.entries(m)){if(name.includes(k))return v}
  return '🐠';
}
